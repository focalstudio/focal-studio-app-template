name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to **[APP_NAME]**. Please describe
        the problem first, then the solution you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is it for?
      placeholder: As a user, I find it hard to ... because ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Where does this belong?
      description: Best guess at which layer of the app this affects.
      options:
        - Shared logic (store / utils)
        - UI layer (screen / component)
        - Service (notifications, analytics, payments, backend)
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: milestone
    attributes:
      label: Target milestone
      description: When should this ship?
      options:
        - open-beta
        - public
        - post-release
        - Not sure
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
