name: Bug report
description: Report something that is broken or behaving incorrectly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the
        sections below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: When I tap X, the app does Y instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this issue?
      options:
        - critical (crash / data loss / blocks release)
        - high (important, should not slip)
        - medium (planned, can slip)
        - low (nice to have)
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device & OS version
      description: e.g. iPhone 15 Pro, iOS 18.2
      placeholder: iPhone 15 Pro, iOS 18.2
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: The version shown in Settings (e.g. 0.5.0).
      placeholder: 0.5.0
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: If applicable, drag images or videos here to help explain the problem.
    validations:
      required: false
